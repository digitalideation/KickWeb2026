<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- GSAP through CDN https://cdnjs.com/libraries/gsap-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollSmoother.min.js" integrity="sha512-t4hwZimhnCKT3YLAsEcAcRDkngVFfCcUIfNLIjklrIZAZKD+GfQMP7HbRcsVHxNS48WRBSywNU1uSM2zzLQt1Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="gsap.css">
</head>
<body>
    <!-- HTML Structure -->
<div id="smooth-wrapper">
  <div id="smooth-content">
    <header class="header">
      <h1 class="heading-l heading-scroll">ScrollSmoother</h1>
      <button class="button">Jump to shape</button>
    </header>
    <div class="box box-a gradient-pink" data-speed="clamp(0.5)">a</div>
    <div class="box box-b gradient-purple" data-speed="clamp(0.8)">b</div>
    <img class="shape" data-speed="1.5" src="https://assets.codepen.io/16327/2D-keyframe-2.png" alt="" />
    <div class="line"></div>
  </div>
</div>
<script src="gsap-script.js"></script>
</body>
</html>
